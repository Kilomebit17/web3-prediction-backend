version: '3.9'

# ROADMAP 12.2: Services — api, worker, postgres:16-alpine, redis:7-alpine
# bull-board, prometheus, grafana, mailhog added in Phase 4

services:
  postgres:
    image: postgres:16-alpine
    container_name: pred_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pred
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pred']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: pred_redis
    # ROADMAP 8.3: AOF must be enabled for BullMQ crash-safety
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: pred_api
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pred?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: pred_worker
    command: pnpm --filter @pred/worker start:dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pred?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  worker_node_modules:

name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@0.2.0-beta
        with:
          service: 443682d1-a673-4da9-aeeb-abed45355f5d
          token: ${{ secrets.RAILWAY_TOKEN }}

name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@0.2.0-beta
        with:
          service: f8e72989-5584-4f65-919e-77e62e64bbc5
          token: ${{ secrets.RAILWAY_TOKEN }}

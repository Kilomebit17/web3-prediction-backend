[build]
  builder = "DOCKERFILE"

# ── Environment variables set via Railway dashboard or `railway variables` ────
# Required:
#   DATABASE_URL    – Railway auto-provides when PostgreSQL plugin is added
#   REDIS_URL       – Railway auto-provides when Redis plugin is added
#   TELEGRAM_BOT_TOKEN
#
# JWT keys — store as base64-encoded env vars (Railway-compatible):
#   JWT_PRIVATE_KEY=<base64-encoded PEM>
#   JWT_PUBLIC_KEY=<base64-encoded PEM>
#
# To generate:
#   openssl genrsa 2048 | base64 -w0    →  JWT_PRIVATE_KEY
#   openssl rsa -in private.pem -pubout | base64 -w0  →  JWT_PUBLIC_KEY
#
# See .env.example for all available variables.

# ── Deploy ─────────────────────────────────────────────────────────────────────

[deploy]
  numReplicas = 1
  restartPolicyMaxRetries = 3

# ── Services ───────────────────────────────────────────────────────────────────
# Railway supports multiple services per project.
# Define them in the dashboard under the same project.

# Service 1: API
#   Root Directory: /
#   Start Command: (handled by Dockerfile ENTRYPOINT, SERVICE_TYPE=api)
#   Healthcheck Path: /healthz
#   Port: 3000

# Service 2: Worker
#   Root Directory: /
#   Start Command: (handled by Dockerfile ENTRYPOINT, SERVICE_TYPE=worker)
#   No public port needed
